# AI Dungeon Master - Server Configuration

server:
  host: "0.0.0.0"
  port: 8000
  # Set to true to allow connections from any origin (dev mode)
  cors_allow_all: true

ollama:
  model: "dolphin-llama3:8b"
  base_url: "http://localhost:11434"
  temperature: 0.8
  context_length: 8192

  # Vision model for map analysis (set to "" to disable)
  vision_model: ""

rag:
  # PDF roots - add your local paths here
  pdf_roots:
    - "/home/tyler/tabletop-rpg"

  # Specific PDFs to index (paths relative to whichever pdf_root they live under)
  include_files:
    # --- OSE Core Rules ---
    - "OSR/Old-School Essentials/Old-School Essentials Classic Fantasy Rules Tome [1.3].pdf"
    - "OSR/Old-School Essentials/Old-School Essentials Classic Fantasy Monsters [1.0].pdf"
    - "OSR/Old-School Essentials/Old-School Essentials Classic Fantasy Treasures [1.0].pdf"
    - "OSR/Old-School Essentials/Old-School Essentials Classic Fantasy Cleric and Magic-User Spells [1.0].pdf"

    # --- Adventure Module (uncomment ONE) ---
    # - "OSR/Castle Xyntillan/EMDT60 Castle Xyntillan (SW).pdf"
    # - "OSR/Castle Xyntillan/EMDT60 Castle Xyntillan GM's Worksheet.pdf"
    # - "OSR/Barrowmaze/Barrowmaze Complete.pdf"
    # - "OSR/Tomb of the Serpent Kings/Tomb of the Serpent Kings (OSR).pdf"

  chunk_size: 500
  chunk_overlap: 50
  top_k: 8
  embedding_model: "all-MiniLM-L6-v2"

game:
  system: "ose"
  max_players: 0        # 0 = unlimited
  auto_save: true
  auto_save_interval: 10  # turns between auto-saves
  # Wandering monster check frequency (turns)
  wandering_monster_interval: 2
  # Torch duration in turns
  torch_duration: 6
  lantern_duration: 24

persistence:
  db_path: "data/sessions/aidm.db"
