        - "Detect Magic"
        - "Floating Disc"
        - "Hold Portal"
        - "Light"
        - "Magic Missile"
        - "Protection from Evil"
        - "Read Languages"
        - "Read Magic"
        - "Shield"
        - "Sleep"
        - "Ventriloquism"
      special_abilities: []

    - name: Thief
      hit_die: "1d4"
      prime_attribute: DEX
      requirements: {}
      save_values:
        "Death/Poison": 13
        "Wands": 14
        "Paralysis/Petrify": 13
        "Breath Attacks": 16
        "Spells/Rods/Staves": 15
      thac0: 19
      armor_allowed: ["leather"]
      weapons_allowed: ["any"]
      starting_equipment: ["Short Sword", "Dagger", "Short Bow"]
      special_abilities:
        - "Backstab: +4 to hit and double damage when attacking from behind undetected."
        - "Thief skills: Open Locks 15%, Find/Remove Traps 10%, Pick Pockets 20%, Move Silently 20%, Climb Walls 87%, Hide in Shadows 10%, Hear Noise 2-in-6."

    - name: Dwarf
      hit_die: "1d8"
      prime_attribute: STR
      requirements:
        CON: 9
      save_values:
        "Death/Poison": 8
        "Wands": 9
        "Paralysis/Petrify": 10
        "Breath Attacks": 13
        "Spells/Rods/Staves": 12
      thac0: 19
      armor_allowed: ["any"]
      weapons_allowed: ["any", "no long bows", "no two-handed swords"]
      starting_equipment: ["Battle Axe", "Hand Axe"]
      special_abilities:
        - "Infravision 60'"
        - "Listen at doors: 2-in-6"
        - "Detect room traps, sliding walls, sloping corridors: 2-in-6"

    - name: Elf
      hit_die: "1d6"
      prime_attribute: STR
      requirements:
        INT: 9
      save_values:
        "Death/Poison": 12
        "Wands": 13
        "Paralysis/Petrify": 13
        "Breath Attacks": 15
        "Spells/Rods/Staves": 15
      thac0: 19
      armor_allowed: ["any"]
      weapons_allowed: ["any"]
      starting_equipment: ["Sword", "Short Bow", "Dagger"]
      spell_slots_by_level: [1]
      starting_spells:
        - "Charm Person"
        - "Detect Magic"
        - "Floating Disc"
        - "Hold Portal"
        - "Light"
        - "Magic Missile"
        - "Protection from Evil"
        - "Read Languages"
        - "Read Magic"
        - "Shield"
        - "Sleep"
        - "Ventriloquism"
