id: ose
name: "Old-School Essentials"
version: "Classic Fantasy 1.3"
genre: fantasy

dm_title: "Dungeon Master"
player_term: "player"
tone: "gritty, old-school, deadly"
gm_principles:
  - "Be fair but deadly. OSR play is dangerous. Don't pull punches, but give players fair warnings and meaningful choices."
  - "Value player agency. Present situations and let players decide. Never decide actions for the players."
  - "Keep the game moving. Be descriptive but concise. Don't monologue."
  - "The world is alive and has consequences. EVERY action has a reaction."

