      abbreviation: STR
      min_value: 3
      max_value: 18
      generation_method: "3d6"
      modifier_table:
        "3": -3
        "4-5": -2
        "6-8": -1
        "9-12": 0
        "13-15": 1
        "16-17": 2
        "18": 3
    - name: Dexterity
      abbreviation: DEX
      min_value: 3
      max_value: 18
      generation_method: "3d6"
      modifier_table:
        "3": -3
        "4-5": -2
        "6-8": -1
        "9-12": 0
        "13-15": 1
        "16-17": 2
        "18": 3
    - name: Constitution
      abbreviation: CON
      min_value: 3
      max_value: 18
      generation_method: "3d6"
      modifier_table:
