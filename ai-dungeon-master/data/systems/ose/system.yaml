# ── Character Types ───────────────────────────────────────

character_types:
  label: Class
  optional: false
  types:
    - name: Fighter
      hit_die: "1d8"
      prime_attribute: STR
      requirements: {}
      save_values:
        "Death/Poison": 12
        "Wands": 13
        "Paralysis/Petrify": 14
        "Breath Attacks": 15
        "Spells/Rods/Staves": 16
      thac0: 19
      armor_allowed: ["any"]
      weapons_allowed: ["any"]
      starting_equipment: ["Sword", "Dagger"]
      special_abilities: []

    - name: Cleric
      hit_die: "1d6"
      prime_attribute: WIS
      requirements: {}
      save_values:
        "Death/Poison": 11
        "Wands": 12
        "Paralysis/Petrify": 14
        "Breath Attacks": 16
        "Spells/Rods/Staves": 15
      thac0: 19
      armor_allowed: ["any"]
      weapons_allowed: ["blunt"]
      starting_equipment: ["Mace", "War Hammer"]
      spell_slots_by_level: [0]
      starting_spells:
        - "Cure Light Wounds"
        - "Detect Evil"
        - "Detect Magic"
        - "Light"
        - "Protection from Evil"
        - "Purify Food and Water"
        - "Remove Fear"
        - "Resist Cold"
      special_abilities:
        - "Turn Undead: Roll 2d6 — Skeletons on 7+, Zombies on 9+, Ghouls on 11+. Cannot turn higher undead at L1."

    - name: Magic-User
      hit_die: "1d4"
      prime_attribute: INT
      requirements: {}
      save_values:
        "Death/Poison": 13
        "Wands": 14
        "Paralysis/Petrify": 13
        "Breath Attacks": 16
        "Spells/Rods/Staves": 15
      thac0: 19
      armor_allowed: ["none"]
      weapons_allowed: ["dagger", "staff"]
      starting_equipment: ["Dagger", "Staff"]
      spell_slots_by_level: [1]
      starting_spells:
